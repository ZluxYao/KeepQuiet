<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>闭嘴</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Noto Sans SC', sans-serif;
    }

    .bg-flash {
      position: fixed;
      inset: 0;
      background: #ff0000;
      opacity: 0;
      pointer-events: none;
      z-index: 0;
      animation: flash 4s ease-in-out infinite;
    }

    @keyframes flash {
      0%, 100% { opacity: 0; }
      48%       { opacity: 0; }
      50%       { opacity: 0.07; }
      52%       { opacity: 0; }
      78%       { opacity: 0; }
      80%       { opacity: 0.05; }
      82%       { opacity: 0; }
    }

    .main {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .big {
      font-size: clamp(120px, 30vw, 380px);
      font-weight: 900;
      color: #ff0000;
      line-height: 0.85;
      letter-spacing: -8px;
      text-shadow:
        6px 6px 0 #7a0000,
        0 0 60px rgba(255,0,0,0.4);
      animation: shake 0.1s ease-in-out infinite;
      user-select: none;
    }

    @keyframes shake {
      0%   { transform: translate(0, 0) rotate(0deg); }
      25%  { transform: translate(-2px, 1px) rotate(-0.3deg); }
      50%  { transform: translate(1px, -1px) rotate(0.2deg); }
      75%  { transform: translate(-1px, 2px) rotate(-0.1deg); }
      100% { transform: translate(2px, -1px) rotate(0.3deg); }
    }

    .sub {
      font-size: clamp(16px, 3vw, 32px);
      font-weight: 900;
      color: #ffffff;
      letter-spacing: clamp(8px, 3vw, 28px);
      text-transform: uppercase;
      margin-top: 20px;
      opacity: 0.9;
      animation: blink 1.2s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.9; }
      50%       { opacity: 0.2; }
    }

    .line {
      width: clamp(200px, 60vw, 600px);
      height: 4px;
      background: #ff0000;
      margin-top: 28px;
      box-shadow: 0 0 20px rgba(255,0,0,0.6);
    }

    .warning {
      margin-top: 24px;
      font-size: clamp(11px, 1.5vw, 16px);
      font-weight: 900;
      color: #ff0000;
      letter-spacing: 3px;
      opacity: 0.5;
      text-transform: uppercase;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.15) 3px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    .noise {
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      opacity: 0.08;
      pointer-events: none;
      z-index: 9;
      animation: noiseMove 0.5s steps(2) infinite;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    }

    @keyframes noiseMove {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-2%, -1%); }
      50%  { transform: translate(1%, 2%); }
      75%  { transform: translate(2%, -2%); }
      100% { transform: translate(-1%, 1%); }
    }
  </style>
</head>
<body>
  <div class="bg-flash"></div>
  <div class="noise"></div>
  <div class="main">
    <div class="big"></div>
    <div class="line">保持安静</div>
    <div class="sub">闭嘴</div>
    <div class="warning">⚠ KEEP YOUR MOUTH SHUT ⚠</div>
  </div>
</body>
</html>
